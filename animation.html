<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Animator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/animstyles.css">
</head>

<body>

<div id="tickerField"></div>

<div id="modifierPanel">
  <div class="mod-title"><sub2>Modifiers</sub2></div>

  <label>
    <p>Background</p>
    <input type="color" id="bgPicker" value="#000000">
  </label>

<label>
  <p>Text Color</p>
  <input type="color" id="textPicker" value="#c9c9c9">
</label>

<label>
  <p>Density &nbsp<sub3>250 max</sub3></p>
  <input type="number" id="densityInput" value="25" min="1" max="250">
</label>

  <label>
    <p>Color Randomizer</p>
    <input type="checkbox" id="driftToggle">
  </label>
</div>

<div id="return">
  <a href="index.html"><p>Return to Home</p></a>
</div>

<script src="js/animscript.js"></script>

</body>
</html>
