

<!DOCTYPE html>

<head>
  
    <meta charset="utf-8">
    <title>Archive</title>
    <link rel="stylesheet" href="css/archive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@latest/dist/dotlottie-wc.js" type="module"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="nav-container">
        <div id="nav">
            <div id="nav-left">
                <a href="index.html"><sub>Home</sub></a>
            </div>
            <div id="nav-right">
                <a href="archive.html"><sub>Archive</sub></a>
            </div>
        </div>
    </div>
</div>


<div id="lookup-container">
  <div id="lookup-header"
  <h2>Lookup</h2>
  <p>Enter an ISO timestamp or keyword to locate response</p>
</div>
  <input id="iso-lookup" placeholder="YYYY-MM-DDTHH:MM:SS">
  <div id="lookup-result"></div>
  <div id="lookup-dropdown"></div>
</div>

<div id="archive">

  <div id="archive-header">
  <div class="archive-year">2026</div>
</div>

  <!-- ROW 1 -->
  <div class="month-row">

    <div class="month" data-month="01">
      <div class="month-label"><s>JAN</s></div>
    </div>

    <div class="month" data-month="02">
      <div class="month-label"><s>FEB</s></div>
    </div>

    <div class="month" data-month="03">
      <div class="month-label">MAR</div>
    </div>

    <div class="row-content"></div>

  </div>

  <!-- ROW 2 -->
  <div class="month-row">
    <div class="month" data-month="04"><div class="month-label">APR</div></div>
    <div class="month" data-month="05"><div class="month-label">MAY</div></div>
    <div class="month" data-month="06"><div class="month-label">JUN</div></div>
    <div class="row-content"></div>
  </div>

  <!-- ROW 3 -->
  <div class="month-row">
    <div class="month" data-month="07"><div class="month-label">JUL</div></div>
    <div class="month" data-month="08"><div class="month-label">AUG</div></div>
    <div class="month" data-month="09"><div class="month-label">SEP</div></div>
    <div class="row-content"></div>
  </div>

  <!-- ROW 4 -->
  <div class="month-row">
    <div class="month" data-month="10"><div class="month-label">OCT</div></div>
    <div class="month" data-month="11"><div class="month-label">NOV</div></div>
    <div class="month" data-month="12"><div class="month-label">DEC</div></div>
    <div class="row-content"></div>
  </div>
<div id="footer">

</div>

<script src="js/archive.js"></script>



</div>
</body>
</html>
